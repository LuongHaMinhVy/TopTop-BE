spring:
  main:
    lazy-initialization: false
  application:
    name: back
  security:
    oauth2:
      client:
        registration:
          google:
            clientId: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            clientSecret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            redirectUri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - email
              - profile
          facebook:
            client-id: ${FACEBOOK_APP_ID:dummy-facebook-app-id}
            client-secret: ${FACEBOOK_APP_SECRET:dummy-facebook-app-secret}
            scope:
              - email
              - public_profile
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
  datasource:
    url: ${DB_URL:${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/toptop?useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:${DDL_AUTO:validate}}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        query:
          plan_cache_max_size: 256
          in_clause_parameter_padding: true

  logging:
    level:
      org.springframework.security: INFO
      org.hibernate.SQL: WARN

  cache:
    type: redis

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    verification-expiration-hours: ${VERIFICATION_EXPIRY_HOURS:24}
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:60000}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework


jwt:
  secret: ${SECRET_KEY:default_secret_key_must_be_changed_in_production_at_least_256_bits_long}
  access-token-expiration: ${ACCESS_TOKEN_EXPIRATION_TIME:86400000}
  refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION_TIME:604800000}

frontend:
  urls: ${FRONTEND_URLS:${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002,http://26.87.198.178:3000,http://26.87.198.178:3001,http://26.87.198.178:3002}}


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

cloudflare:
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket-name: ${R2_BUCKET_NAME:}
    endpoint: ${R2_ENDPOINT:https://dummy-endpoint.com}
    public-url: ${R2_PUBLIC_URL:https://dummy-url.com}

moderation:
  auto-approve-threshold: 0.35
  auto-reject-threshold: 0.85
  text:
    auto-reject-threshold: 0.35
  frame-sampling:
    max-frames: 8

ai:
  gemini:
    enabled: ${GEMINI_ENABLED:true}
    recommendations-enabled: ${GEMINI_RECOMMENDATIONS_ENABLED:true}
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    endpoint: ${GEMINI_ENDPOINT:https://generativelanguage.googleapis.com/v1beta}

acrcloud:
  enabled: ${ACRCLOUD_ENABLED:false}
  access-key: ${ACRCLOUD_ACCESS_KEY:}
  access-secret: ${ACRCLOUD_ACCESS_SECRET:${ACRCLOUD_SECRET_KEY:}}
  host: ${ACRCLOUD_HOST:}

ffmpeg:
  path: ${FFMPEG_PATH:ffmpeg}
  max-frames: ${FFMPEG_MAX_FRAMES:5}

livekit:
  url: ${LIVEKIT_URL:ws://localhost:7880}
  api-key: ${LIVEKIT_API_KEY:dummy_key}
  api-secret: ${LIVEKIT_API_SECRET:dummy_secret}

payment:
  default-currency: VND
  success-path: /payment/success
  cancel-path: /payment/cancel
  paypal-success-path: /payment/paypal/success

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: vnd

paypal:
  mode: ${PAYPAL_MODE:sandbox}
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  currency: USD
  vnd-to-usd-rate: ${PAYPAL_VND_TO_USD_RATE:25000}

search:
  opensearch:
    enabled: ${OPENSEARCH_ENABLED:false}
    index-on-startup: ${OPENSEARCH_INDEX_ON_STARTUP:false}
    url: ${OPENSEARCH_URL:http://localhost:9200}
    index-name: ${OPENSEARCH_INDEX_NAME:toptop_search}
    username: ${OPENSEARCH_USERNAME:}
    password: ${OPENSEARCH_PASSWORD:}

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY:}
      model-name: ${GEMINI_MODEL:gemini-2.5-flash}
      temperature: ${GEMINI_TEMPERATURE:0.2}
      timeout: ${GEMINI_TIMEOUT:60s}
      log-requests: ${GEMINI_LOG_REQUESTS:false}
      log-responses: ${GEMINI_LOG_RESPONSES:false}